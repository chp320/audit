<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>GitLab 미접속 계정 관리자 패널</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <h2>GitLab 계정 정리 감사(Audit) 로그</h2>
    <table border="1">
        <thead>
            <tr>
				<th>변경 일시 (DB 자동생성)</th>
                <th>배치 실행일자</th>
                <th>계정명</th>
                <th>최종 상태</th>
                <th>상세 사유</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="audit : ${audits}">
				<td th:text="${#temporals.format(audit.createdAt, 'yyyy-MM-dd HH:mm:ss')}"></td>
                <td th:text="${audit.executionDate}"></td>
                <td th:text="${audit.username}"></td>
                <td th:text="${audit.finalAction}"></td>
                <td th:text="${audit.errorMessage}"></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
