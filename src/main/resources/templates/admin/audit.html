<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>GitLab 계정 정리 감사 대시보드</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .navbar { background-color: #333; overflow: hidden; padding: 14px 20px; color: white; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .navbar a { color: #f2f2f2; text-decoration: none; padding: 10px; font-weight: bold; }
        .navbar a:hover { background-color: #ddd; color: black; border-radius: 4px; }
        .nav-right { display: flex; align-items: center; gap: 15px; }
        .logout-btn { background-color: #f44336; color: white; border: none; padding: 8px 12px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .logout-btn:hover { background-color: #d32f2f; }
        
        .search-box { margin-bottom: 20px; padding: 15px; background-color: #f9f9f9; border: 1px solid #ddd; border-radius: 4px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="nav-left">
            <a href="/admin/audit">감사 이력 조회 (메인)</a>
            <a href="/admin/accounts sec:authorize="hasRole('ADMIN')"">관리자 계정 관리</a>
        </div>
        <div class="nav-right">
            <span>환영합니다, <b th:text="${currentUsername != null ? currentUsername : '관리자'}"></b>님</span>
            <form th:action="@{/logout}" method="post" style="margin: 0;">
                <button type="submit" class="logout-btn">로그아웃</button>
            </form>
        </div>
    </div>

    <h2>[ <span th:text="${username != null and username != '' ? username : '전체'}"></span> ] 계정 처리 이력</h2>

    <div class="search-box">
        <form action="/admin/audit" method="get">
            <label for="username"><b>계정명 검색: </b></label>
            <input type="text" id="username" name="username" th:value="${username}" placeholder="예: skyfox" style="padding: 6px; width: 200px;">
            <button type="submit" style="padding: 6px 12px; cursor: pointer;">검색</button>
            <a href="/admin/audit" style="margin-left: 10px; text-decoration: none; color: #333; border: 1px solid #ccc; padding: 6px 12px; background-color: #eee;">필터 초기화</a>
        </form>
    </div>

    <table>
        <thead>
            <tr>
                <th>변경 일시 (DB 자동생성)</th>
                <th>배치 실행일자</th>
                <th>계정명</th>
                <th>최종 상태</th>
                <th>상세 사유</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="audit : ${audits}">
                <td th:text="${#temporals.format(audit.createdAt, 'yyyy-MM-dd HH:mm:ss')}"></td>
                <td th:text="${audit.executionDate}"></td>
                <td th:text="${audit.username}"></td>
                <td th:text="${audit.finalAction}"></td>
                <td th:text="${audit.errorMessage}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(audits)}">
                <td colspan="5" style="padding: 30px; color: #666;">조회된 이력 데이터가 없습니다.</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
